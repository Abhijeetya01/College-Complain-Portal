<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - College Complaint Portal</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header admin-header">
                <a href="role-select.html" class="back-btn">
                    <i class="fas fa-arrow-left"></i>
                </a>
                <i class="fas fa-user-shield auth-icon"></i>
                <h1>Admin Login</h1>
                <p>Access the complaint management system</p>
            </div>

            <form id="adminLoginForm" class="auth-form">
                <div class="form-group">
                    <label for="username">
                        <i class="fas fa-user"></i> Username
                    </label>
                    <input type="text" id="username" name="username" required>
                </div>

                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i> Password
                    </label>
                    <input type="password" id="password" name="password" required>
                </div>

                <button type="submit" class="auth-btn admin-btn">
                    <i class="fas fa-sign-in-alt"></i> Login to Admin Panel
                </button>

                <div class="auth-links">
                    <p>Are you a student? <a href="login.html">Student login here</a></p>
                </div>
            </form>

            <div class="admin-credentials">
                <h3>Demo Admin Accounts:</h3>
                <div class="credential-list">
                    <div><strong>hosteladmin</strong> / hostel123 (Hostel Department)</div>
                    <div><strong>academicsadmin</strong> / academics123 (Academics)</div>
                    <div><strong>itadmin</strong> / it123 (IT Department)</div>
                    <div><strong>superadmin</strong> / admin123 (All Departments)</div>
                </div>
            </div>

            <div id="message" class="message"></div>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
